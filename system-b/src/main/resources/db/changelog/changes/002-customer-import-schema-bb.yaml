databaseChangeLog:
  - changeSet:
      id: 005-create-customer-table
      author: codex
      changes:
        - createTable:
            tableName: customer
            remarks: Stores decrypted customer rows imported from staged inbound transfer payloads.
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_customer
                    nullable: false
              - column:
                  name: source_transfer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_of_birth
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR(1)
                  constraints:
                    nullable: false
              - column:
                  name: national_id
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: mobile_number
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: address_line
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: customer
            baseColumnNames: source_transfer_id
            constraintName: fk_customer_source_transfer_id
            referencedTableName: transfer_file
            referencedColumnNames: id
            onDelete: RESTRICT
        - addUniqueConstraint:
            tableName: customer
            columnNames: customer_id
            constraintName: uk_customer_customer_id
        - createIndex:
            tableName: customer
            indexName: idx_customer_source_transfer_id
            columns:
              - column:
                  name: source_transfer_id
