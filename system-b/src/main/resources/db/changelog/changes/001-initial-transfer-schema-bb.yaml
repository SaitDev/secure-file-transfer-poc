databaseChangeLog:
  - changeSet:
      id: 001-create-transfer-batch
      author: codex
      changes:
        - createTable:
            tableName: transfer_batch
            remarks: Tracks one logical batch execution per business date, flow, and batch number.
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transfer_batch
                    nullable: false
              - column:
                  name: business_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: batch_number
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: flow
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: transfer_batch
            columnNames: business_date, batch_number, flow
            constraintName: uk_transfer_batch_business_date_batch_number_flow
        - sql:
            sql: ALTER TABLE transfer_batch ADD CONSTRAINT ck_transfer_batch_flow CHECK (flow IN ('A2B', 'B2A'))

  - changeSet:
      id: 002-create-transfer-file
      author: codex
      changes:
        - createTable:
            tableName: transfer_file
            remarks: Stores transfer lifecycle, file metadata, and retry state.
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transfer_file
                    nullable: false
              - column:
                  name: batch_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: correlation_id
                  type: VARCHAR(255)
                  remarks: Idempotency key derived from the shared file correlation identifier.
                  constraints:
                    nullable: false
              - column:
                  name: source_filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: response_filename
                  type: VARCHAR(255)
              - column:
                  name: remote_path
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: source_checksum
                  type: VARCHAR(64)
              - column:
                  name: source_size_bytes
                  type: BIGINT
              - column:
                  name: encryption_flag
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: storage_backend
                  type: VARCHAR(32)
                  defaultValue: SFTPGO
                  constraints:
                    nullable: false
              - column:
                  name: storage_status
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: downloaded_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: download_ack_sent_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: processing_status
                  type: VARCHAR(64)
              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: retry_count
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_error_code
                  type: VARCHAR(64)
              - column:
                  name: last_error_message
                  type: VARCHAR(1024)
        - addForeignKeyConstraint:
            baseTableName: transfer_file
            baseColumnNames: batch_id
            constraintName: fk_transfer_file_batch_id
            referencedTableName: transfer_batch
            referencedColumnNames: id
            onDelete: RESTRICT
        - addUniqueConstraint:
            tableName: transfer_file
            columnNames: correlation_id
            constraintName: uk_transfer_file_correlation_id
        - createIndex:
            tableName: transfer_file
            indexName: idx_transfer_file_batch_id
            columns:
              - column:
                  name: batch_id
        - createIndex:
            tableName: transfer_file
            indexName: idx_transfer_file_storage_status
            columns:
              - column:
                  name: storage_status
        - createIndex:
            tableName: transfer_file
            indexName: idx_transfer_file_processing_status
            columns:
              - column:
                  name: processing_status

  - changeSet:
      id: 003-create-transfer-payload
      author: codex
      changes:
        - createTable:
            tableName: transfer_payload
            remarks: Stores only encrypted inbound payload bytes for DB-backed staging.
            columns:
              - column:
                  name: transfer_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transfer_payload
                    nullable: false
              - column:
                  name: encrypted_content
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: content_checksum
                  type: VARCHAR(64)
              - column:
                  name: content_size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: purged_at
                  type: TIMESTAMP WITH TIME ZONE
        - addForeignKeyConstraint:
            baseTableName: transfer_payload
            baseColumnNames: transfer_id
            constraintName: fk_transfer_payload_transfer_id
            referencedTableName: transfer_file
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 004-create-transfer-event
      author: codex
      changes:
        - createTable:
            tableName: transfer_event
            remarks: Audit log for inbound transfer lifecycle events.
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transfer_event
                    nullable: false
              - column:
                  name: transfer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: event_timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: detail
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: transfer_event
            baseColumnNames: transfer_id
            constraintName: fk_transfer_event_transfer_id
            referencedTableName: transfer_file
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            tableName: transfer_event
            indexName: idx_transfer_event_transfer_id
            columns:
              - column:
                  name: transfer_id
        - createIndex:
            tableName: transfer_event
            indexName: idx_transfer_event_event_timestamp
            columns:
              - column:
                  name: event_timestamp
